  <main class="main">
    <div class="page-header reveal">
      <div class="page-header__label">Nocual</div>
      <h1 class="page-header__title">Planner</h1>
    </div>

    <div class="planner-layout">

      <!-- Left: Calendar -->
      <div class="cal reveal reveal--delay-1">
        <div class="cal__header">
          <button class="cal__nav" id="cal-prev" aria-label="Previous month">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="cal__month-year" id="cal-month-year"></div>
          <button class="cal__nav" id="cal-next" aria-label="Next month">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="cal__day-labels">
          <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
        </div>
        <div class="cal__grid" id="cal-grid"></div>
      </div>

      <!-- Right: Day View -->
      <div class="day-view reveal reveal--delay-2">
        <div class="day-view__header">
          <div class="day-view__date-num" id="day-num"></div>
          <div class="day-view__date-label">
            <div class="day-view__day-name" id="day-name"></div>
            <div class="day-view__full-date" id="day-full-date"></div>
          </div>
        </div>

        <form class="block-form" id="block-form">
          <input type="time" class="block-form__time input" id="block-time" required aria-label="Block time">
          <input type="text" class="block-form__text input" id="block-text" placeholder="What's happening..." required aria-label="Block description">
          <button type="submit" class="btn btn--primary">Add</button>
        </form>

        <div class="schedule" id="schedule-list">
          <!-- blocks rendered by JS -->
        </div>
      </div>

      <!-- Bottom: Todo Section -->
      <div class="todo-section reveal reveal--delay-3">
        <div class="todo-section__header">
          <h2 class="todo-section__title">Todos</h2>
          <span class="todo-section__count" id="todo-count"></span>
        </div>

        <form class="todo-form" id="todo-form">
          <input type="text" class="todo-form__input input" id="todo-input" placeholder="What needs doing..." required aria-label="New todo">
          <select class="todo-form__priority input" id="todo-priority" aria-label="Priority">
            <option value="normal">Normal</option>
            <option value="high">High</option>
          </select>
          <button type="submit" class="btn btn--primary">Add</button>
        </form>

        <div class="todo-list" id="todo-list">
          <!-- todos rendered by JS -->
        </div>
      </div>

    </div>
  </main>

  <div class="assistant" id="assistant">
    <div class="assistant__bar">
      <div class="assistant__toggle" id="assistant-toggle">
        <div class="assistant__orb"></div>
        <span class="assistant__name">Noc</span>
      </div>
      <div class="assistant__input-wrap">
        <input type="text" class="assistant__input" id="assistant-input" placeholder="ask me anything or tell me what to add..." autocomplete="off">
      </div>
      <button class="assistant__send" id="assistant-send" aria-label="Send">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <button class="assistant__expand-btn" id="assistant-expand" aria-label="Expand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
    <div class="assistant__chat" id="assistant-chat"></div>
  </div>

  <script src="config.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/obsidian.js" defer></script>
  <script src="js/assistant.js" defer></script>
  <script src="js/planner.js" defer></script>
</body>
</html>
