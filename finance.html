</head>

      <a href="habits.html" class="nav-link">

        Habits

      <a href="notes.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

        That Thing
      </a>

    <div class="sidebar__bottom">
      <div class="sidebar__date" id="sidebar-date"></div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Finance</h1>
      <p class="page-sub">track your money across accounts</p>
    </div>

    <!-- Sparkline chart -->
    <div id="sparkline-wrap" class="sparkline-wrap"></div>

    <!-- Savings Hero -->
    <div class="savings-hero">
      <div class="savings-hero__label">total savings</div>
      <div class="savings-hero__amount">
        <span class="savings-hero__currency">₱</span><span id="hero-total">0</span>
      </div>
      <div class="savings-hero__updated" id="hero-updated">—</div>
    </div>

    <!-- Account Cards -->
    <div class="accounts-grid">
      <div class="account-card" id="card-gcash">
        <div class="account-card__icon">G</div>
        <div class="account-card__name">GCash</div>
        <div class="account-card__amount" id="amt-gcash">₱0</div>
        <div class="account-card__bar">
          <div class="account-card__bar-fill" id="bar-gcash" style="width:0%"></div>
        </div>
      </div>
      <div class="account-card" id="card-card">
        <div class="account-card__icon">C</div>
        <div class="account-card__name">Card</div>
        <div class="account-card__amount" id="amt-card">₱0</div>
        <div class="account-card__bar">
          <div class="account-card__bar-fill" id="bar-card" style="width:0%"></div>
        </div>
      </div>
      <div class="account-card" id="card-cash">
        <div class="account-card__icon">$</div>
        <div class="account-card__name">Cash</div>
        <div class="account-card__amount" id="amt-cash">₱0</div>
        <div class="account-card__bar">
          <div class="account-card__bar-fill" id="bar-cash" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Finance Actions -->
    <div class="finance-actions">
      <!-- Add Money -->
      <div class="finance-form finance-form--add">
        <div class="finance-form__title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Money
        </div>
        <div class="form-group">
          <label class="form-label" for="add-amount">Amount (₱)</label>
          <input class="input" type="number" id="add-amount" placeholder="0" min="0" step="any">
        </div>
        <div class="form-group">
          <label class="form-label" for="add-desc">Description</label>
          <input class="input" type="text" id="add-desc" placeholder="e.g. freelance payment">
        </div>
        <div class="form-group">
          <label class="form-label" for="add-account">Account</label>
          <select class="input" id="add-account">
            <option value="gcash">GCash</option>
            <option value="card">Card</option>
            <option value="cash">Cash</option>
          </select>
        </div>
        <button class="btn btn--add" id="btn-add" style="width:100%;margin-top:4px">+ Add</button>
      </div>

      <!-- Spend Money -->
      <div class="finance-form finance-form--spend">
        <div class="finance-form__title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Spend Money
        </div>
        <div class="form-group">
          <label class="form-label" for="spend-amount">Amount (₱)</label>
          <input class="input" type="number" id="spend-amount" placeholder="0" min="0" step="any">
        </div>
        <div class="form-group">
          <label class="form-label" for="spend-desc">Description</label>
          <input class="input" type="text" id="spend-desc" placeholder="e.g. groceries">
        </div>
        <div class="form-group">
          <label class="form-label" for="spend-account">Account</label>
          <select class="input" id="spend-account">
            <option value="gcash">GCash</option>
            <option value="card">Card</option>
            <option value="cash">Cash</option>
          </select>
        </div>
        <button class="btn btn--spend" id="btn-spend" style="width:100%;margin-top:4px">− Spend</button>
      </div>
    </div>

    <!-- Recurring Income -->
    <div class="recurring-section">
      <div class="recurring-section__header">
        <span style="font-family:var(--font-display);font-weight:700;font-size:var(--font-size-base);letter-spacing:-0.02em">Recurring Income</span>
      </div>
      <div class="recurring-list" id="recurring-list">
        <!-- populated by JS -->
      </div>
      <!-- Add recurring inline form -->
      <div class="recurring-add">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="rec-name">Name</label>
          <input class="input" type="text" id="rec-name" placeholder="e.g. salary">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="rec-amount">Amount</label>
          <input class="input" type="number" id="rec-amount" placeholder="0" min="0">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="rec-freq">Frequency</label>
          <select class="input" id="rec-freq">
            <option value="weekly">Weekly</option>
            <option value="biweekly">Biweekly</option>
            <option value="monthly" selected>Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="rec-account">Account</label>
          <select class="input" id="rec-account">
            <option value="gcash">GCash</option>
            <option value="card">Card</option>
            <option value="cash">Cash</option>
          </select>
        </div>
        <button class="btn btn--add" id="btn-add-recurring" style="white-space:nowrap">+ Add</button>
      </div>
    </div>

    <!-- Transaction History -->
    <div class="tx-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md)">
        <span style="font-family:var(--font-display);font-weight:700;font-size:var(--font-size-base);letter-spacing:-0.02em">Transactions</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)" id="tx-count">0 entries</span>
      </div>
      <div id="tx-list">
        <!-- populated by JS -->
      </div>
    </div>
  </main>

  <!-- Assistant -->
  <div class="assistant" id="assistant">
    <div class="assistant__bar">
      <div class="assistant__toggle" id="assistant-toggle">
        <div class="assistant__orb"></div>
        <span class="assistant__name">Noc</span>
      </div>
      <div class="assistant__input-wrap">
        <input type="text" class="assistant__input" id="assistant-input" placeholder="ask me anything or tell me what to add..." autocomplete="off">
      </div>
      <button class="assistant__send" id="assistant-send" aria-label="Send">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <button class="assistant__expand-btn" id="assistant-expand" aria-label="Expand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
    <div class="assistant__chat" id="assistant-chat"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/store.js" defer></script>
  <script src="js/obsidian.js" defer></script>
  <script src="js/assistant.js" defer></script>
  <script src="js/finance.js" defer></script>
  <script src="js/mobile-nav.js" defer></script>
  <script src="js/transitions.js" defer></script>
</body>
</html>
