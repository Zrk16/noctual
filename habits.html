<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nocual — Habits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-text">Nocual</div>
      <div class="sidebar__logo-sub">personal OS</div>
    </div>
    <nav class="sidebar__nav">
      <span class="sidebar__section-label">Overview</span>
      <a href="index.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="planner.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Planner
      </a>
      <a href="finance.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Finance
      </a>
      <a href="habits.html" class="nav-link nav-link--active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Habits
      </a>
      <span class="sidebar__section-label">AI</span>
      <a href="roast.html" class="nav-link nav-link--ai">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Roast Me
      </a>
      <a href="hype.html" class="nav-link nav-link--ai">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Hype
      </a>
      <a href="that-thing.html" class="nav-link nav-link--ai">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        That Thing
      </a>
    </nav>
    <div class="sidebar__bottom">
      <div class="sidebar__date" id="sidebar-date"></div>
    </div>
  </aside>

  <main class="main">
    <div class="reveal">

      <header class="page-header">
        <div class="page-header__left">
          <span class="page-header__label">today's streak</span>
          <h1 class="page-header__title">Habits</h1>
        </div>
        <div class="page-header__right">
          <span class="habits-progress" id="habits-progress">0 / 0 done today</span>
        </div>
      </header>

      <form class="add-habit-form" id="add-habit-form" autocomplete="off">
        <input
          type="text"
          class="add-habit-form__input"
          id="habit-input"
          placeholder="new habit name..."
          maxlength="80"
          aria-label="New habit name"
        />
        <button type="submit" class="add-habit-form__btn btn btn--primary">Add habit</button>
      </form>

      <ul class="habit-list" id="habit-list" role="list" aria-label="Habits"></ul>

      <div class="habits-empty" id="habits-empty" aria-live="polite">
        no habits yet. add one above.
      </div>

    </div>
  </main>

  <div class="assistant" id="assistant">
    <div class="assistant__bar">
      <div class="assistant__toggle" id="assistant-toggle">
        <div class="assistant__orb"></div>
        <span class="assistant__name">Noc</span>
      </div>
      <div class="assistant__input-wrap">
        <input type="text" class="assistant__input" id="assistant-input" placeholder="ask me anything or tell me what to add..." autocomplete="off" />
      </div>
      <button class="assistant__send" id="assistant-send" aria-label="Send">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <button class="assistant__expand-btn" id="assistant-expand" aria-label="Expand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
    <div class="assistant__chat" id="assistant-chat"></div>
  </div>

  <script src="config.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/obsidian.js" defer></script>
  <script src="js/assistant.js" defer></script>
  <script src="js/habits.js" defer></script>
</body>
</html>
