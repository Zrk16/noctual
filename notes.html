      <span class="sidebar__section-label">Overview</span>
      <a href="index.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="planner.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Planner
      </a>
      <a href="finance.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Finance
      </a>
      <a href="habits.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Habits
      </a>
      <a href="notes.html" class="nav-link nav-link--active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Notes
      </a>
      <span class="sidebar__section-label">AI</span>
      <a href="roast.html" class="nav-link nav-link--ai">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Roast Me
      </a>
      <a href="hype.html" class="nav-link nav-link--ai">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Hype

      <a href="that-thing.html" class="nav-link nav-link--ai">

        That Thing
      </a>
    </nav>
    <div class="sidebar__bottom">
      <div class="sidebar__date" id="sidebar-date"></div>
    </div>
  </aside>

  <!-- Notes shell -->
  <div class="notes-shell">

    <!-- Notes sidebar -->
    <aside class="notes-sidebar">
      <div class="notes-sidebar__header">
        <button class="btn btn--sm" id="new-note-btn">+ New note</button>
        <button class="btn btn--ghost btn--sm btn--icon" id="graph-toggle-btn" title="Graph view">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14" stroke-width="2">
            <circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/>
            <line x1="7" y1="11.2" x2="17" y2="6.3"/><line x1="7" y1="12.8" x2="17" y2="17.7"/>
          </svg>
        </button>
      </div>
      <div class="notes-search-wrap">
        <input type="text" class="notes-search" id="notes-search" placeholder="Search notes...">
      </div>
      <div class="notes-list" id="notes-list">
        <div class="notes-empty" id="notes-empty">No notes yet.<br>Hit + New note to start.</div>
      </div>
    </aside>

    <!-- Editor -->
    <div class="notes-editor" id="notes-editor">
      <div class="notes-editor__empty" id="editor-empty">
        <div class="notes-editor__empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="32" height="32" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <p>Select a note or create a new one</p>
      </div>

      <div class="notes-editor__inner" id="editor-inner" style="display:none">
        <div class="notes-editor__topbar">
          <div class="notes-editor__meta" id="editor-meta"></div>
          <div class="notes-editor__actions">
            <div class="notes-link-status" id="link-status" style="display:none">
              <div class="link-status__dot"></div>
              <span id="link-status-text">linking...</span>
            </div>
            <button class="btn btn--ghost btn--sm" id="preview-toggle-btn">Preview</button>
            <button class="btn btn--ghost btn--sm btn--icon" id="delete-note-btn" title="Delete note">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>

        <input type="text" class="notes-title-input" id="note-title" placeholder="Untitled">

        <div class="notes-connections" id="note-connections" style="display:none">
          <span class="notes-connections__label">linked to</span>
          <div class="notes-connections__chips" id="connections-chips"></div>
        </div>

        <textarea class="notes-content" id="note-content" placeholder="Start writing... Markdown supported."></textarea>
        <div class="notes-preview" id="notes-preview" style="display:none"></div>
      </div>
    </div>

    <!-- Graph view -->
    <div class="notes-graph" id="notes-graph" style="display:none">
      <div class="notes-graph__header">
        <span class="notes-graph__label">Knowledge Graph</span>
        <button class="btn btn--ghost btn--sm" id="graph-close-btn">← Back to editor</button>
      </div>
      <div class="notes-graph__hint">Click a node to open the note</div>
      <svg id="graph-svg" width="100%" height="100%"></svg>
    </div>

  </div>

  <!-- Assistant bar -->
  <div class="assistant" id="assistant">
    <div class="assistant__bar">
      <div class="assistant__toggle" id="assistant-toggle">
        <div class="assistant__orb"></div>
        <span class="assistant__name">Noc</span>
      </div>
      <div class="assistant__input-wrap">
        <input type="text" class="assistant__input" id="assistant-input" placeholder="ask me anything or tell me what to add..." autocomplete="off">
      </div>
      <button class="assistant__send" id="assistant-send" aria-label="Send">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <button class="assistant__expand-btn" id="assistant-expand" aria-label="Expand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
    </div>
    <div class="assistant__chat" id="assistant-chat"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/store.js" defer></script>
  <script src="js/assistant.js" defer></script>
  <script src="js/notes.js" defer></script>
</body>
</html>
